name: 抓取菜价数据

on:
  schedule:
    - cron: '0 0 * * *'  # 每天早上8点（北京时间0点 = UTC 0点）
  workflow_dispatch:  # 允许手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout
        uses: actions/checkout@v4
        
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          
      - name: 抓取数据
        run: |
          python scrape.py
          
      - name: 提交数据
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动更新菜价数据 $(date '+%Y-%m-%d')"
          file_pattern: price.csv metadata.json
