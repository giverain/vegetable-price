name: 抓取菜价数据

on:
  schedule:
    - cron: '0 0 * * *'  # 每天早上8点（北京时间）
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: pip install -r requirements.txt
          
      - name: 抓取数据
        run: python scrape.py
          
      - name: 提交并推送数据
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add price.csv metadata.json
          git commit -m "自动更新菜价数据 $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/giverain/vegetable-price.git master --force || echo "GitHub push failed"
          
      - name: 推送到 Gitee
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/puddingdoggg/vegetable-price.git
          git push gitee master --force || echo "Gitee push failed"
