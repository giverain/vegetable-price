name: 抓取菜价数据

on:
  schedule:
    - cron: '0 0 * * *'  # 每天早上8点（北京时间）
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: pip install -r requirements.txt
          
      - name: 抓取数据
        run: python scrape.py
          
      - name: 提交数据到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add price.csv metadata.json
          git commit -m "自动更新菜价数据 $(date '+%Y-%m-%d')" || exit 0
          
      - name: 推送到 GitHub
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
          
      - name: 添加 Gitee remote
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/puddingdoggg/vegetable-price.git
          
      - name: 推送到 Gitee
        run: git push gitee master --force
