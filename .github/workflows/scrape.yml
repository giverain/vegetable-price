name: 抓取菜价数据

on:
  schedule:
    - cron: '0 0 * * *'  # 每天早上8点（北京时间）
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - master

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: pip install -r requirements.txt
          
      - name: 抓取数据
        run: python scrape.py
          
      - name: 提交数据
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动更新菜价数据 $(date '+%Y-%m-%d')"
          file_pattern: price.csv metadata.json

      - name: Mirror to Gitee
        uses: wearerequired/git-mirror-action@v1
        env:
          SSH_PRIVATE_KEY:    # 需要配置 Gitee 的 SSH 私钥
        with:
          source-repo: 'git@github.com:vegetable-price.git'
          destination-repo: 'git@gitee.com:puddingdoggg/vegetable-price.git'   # 改为你的 Gitee 仓库 SSH 地址

      - name: Trigger Gitee Pages rebuild
        uses: yanglbme/gitee-pages-action@main
        with:
          # 注意：Gitee 的 Personal Access Token 需要写入权限
          gitee-username: puddingdoggg      # 你的 Gitee 用户名
          gitee-password: F19960809cxk@      # 你的 Gitee 密码
          gitee-repo: puddingdoggg/vegetable-price                   # 例如：zhangsan/price-table
          branch: main    
